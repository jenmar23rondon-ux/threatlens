services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: threatlens
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  analyzer-python:
    build: ./analyzer-python
    environment:
      PORT: 8002
    ports:
      - "8002:8002"

  backend-node:
    build: ./backend-node
    depends_on:
      - postgres
      - analyzer-python
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/threatlens
      JWT_SECRET: docker_threatlens_secret_change_me
      JWT_EXPIRES_IN: 7d
      ALLOWED_ORIGINS: http://localhost:5175
      ANALYZER_URL: http://analyzer-python:8002
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    depends_on:
      - backend-node
    ports:
      - "5175:80"

volumes:
  postgres_data:

